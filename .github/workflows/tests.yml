name: Testes (RLS + E2E)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  rls-and-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Instalar navegadores do Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Subir Supabase local (Docker)
        run: pnpm exec supabase start

      - name: Aplicar migrations + seed
        run: pnpm exec supabase db reset

      - name: Rodar testes de RLS (pgTAP)
        run: pnpm exec supabase test db

      - name: Capturar variáveis do Supabase local
        run: pnpm exec supabase status -o env >> "$GITHUB_ENV"

      - name: Escrever .env.local para o dev server
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${API_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          NODE_ENV=development
          WHATSAPP_PROVIDER=mock
          LEADER_SIGNUP_CODE=ci-teste
          EOF

      - name: Rodar testes E2E (Playwright)
        env:
          LEADER_SIGNUP_CODE: ci-teste
        run: pnpm exec playwright test

      - name: Publicar relatório do Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Parar Supabase local
        if: always()
        run: pnpm exec supabase stop
